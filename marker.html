<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Printable Hiro Marker</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="marker-page">
    <main class="marker-sheet">
      <section class="marker-card" aria-label="Hiro marker pattern">
        <div class="marker-frame">
          <img
            src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/HIRO.jpg"
            alt="Hiro AR marker"
          >
        </div>
      </section>
      <section class="marker-notes">
        <h1>Test Marker</h1>
        <p>Print this page or open it on another screen. In the MVP page, tap <strong>Start camera</strong> and point the camera at this pattern.</p>
        <p>Keep the pattern flat, bright, and fully visible in the camera frame.</p>
        <a class="secondary" href="./index.html">Back to AR page</a>
      </section>
    </main>
  </body>
</html>
